<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — PMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #0f1117;
      --bg-surface: #161b22;
      --bg-elevated: #1c2333;
      --bg-border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #484f58;
      --accent: #2f81f7;
      --accent-hover: #388bfd;
      --accent-subtle: rgba(47, 129, 247, 0.12);
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
      --info: #58a6ff;
      --font-body: "DM Sans", sans-serif;
      --font-mono: "DM Mono", monospace;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--bg-border) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.35;
      pointer-events: none;
    }
    h2 { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
    label {
      font-size: 12px; font-weight: 500; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block;
    }
    .auth-logo {
      font-size: 20px; font-weight: 700; color: var(--text-primary);
      margin-bottom: 20px; letter-spacing: -0.5px; text-align: center; position: relative; z-index: 1;
    }
    .auth-logo span { color: var(--accent); }
    .auth-card {
      background: var(--bg-surface);
      border: 1px solid var(--bg-border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 400px;
      max-width: 90vw;
      position: relative;
      z-index: 1;
    }
    .form-control-custom {
      background: var(--bg-elevated);
      border: 1px solid var(--bg-border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: 8px 12px;
      font-size: 14px;
      width: 100%;
      font-family: var(--font-body);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .form-control-custom:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }
    .form-control-custom::placeholder { color: var(--text-muted); }
    .input-wrapper { position: relative; }
    .input-wrapper .toggle-pw {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0; font-size: 15px;
    }
    .input-wrapper .toggle-pw:hover { color: var(--text-secondary); }
    .btn-primary-custom {
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); padding: 8px 14px;
      font-size: 14px; font-weight: 500; width: 100%; cursor: pointer;
      transition: opacity 0.15s; font-family: var(--font-body);
    }
    .btn-primary-custom:hover { opacity: 0.88; }
    .btn-primary-custom:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-footer { margin-top: 20px; text-align: center; font-size: 13px; color: var(--text-secondary); }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }
    .forgot-link { color: var(--text-secondary); font-size: 12px; text-decoration: none; }
    .forgot-link:hover { color: var(--text-primary); }
    .divider { border: none; border-top: 1px solid var(--bg-border); margin: 16px 0; }
    /* Dev panel */
    .dev-panel {
      background: var(--bg-surface); border: 1px solid var(--bg-border);
      border-radius: var(--radius-md); padding: 16px 20px; width: 400px;
      max-width: 90vw; margin-top: 16px; position: relative; z-index: 1;
    }
    .dev-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .dev-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .dev-btns { display: flex; gap: 8px; margin-top: 12px; }
    .dev-btn {
      flex: 1; padding: 6px 10px; font-size: 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--bg-border); background: var(--bg-elevated);
      color: var(--text-secondary); cursor: pointer; font-family: var(--font-body);
      transition: all 0.15s;
    }
    .dev-btn:hover { background: var(--accent-subtle); color: var(--accent); border-color: var(--accent); }
    .dev-body { display: none; }
    .dev-body.open { display: block; }
    .form-group { margin-bottom: 16px; }
    .error-msg { font-size: 12px; color: var(--danger); margin-top: 4px; display: none; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-logo">P<span>M</span>S</div>
  <div class="auth-card">
    <h2 class="mb-1">Welcome back</h2>
    <p class="mb-4">Sign in to continue to your workspace.</p>
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="form-control-custom" placeholder="you@example.com" autocomplete="email" />
        <div class="error-msg" id="emailErr">Enter a valid email address.</div>
      </div>
      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <label for="password" style="margin-bottom:0;">Password</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <div class="input-wrapper">
          <input type="password" id="password" class="form-control-custom" placeholder="••••••••" autocomplete="current-password" style="padding-right:36px;" />
          <button type="button" class="toggle-pw" id="togglePw" tabindex="-1"><i class="bi bi-eye-slash"></i></button>
        </div>
        <div class="error-msg" id="passwordErr">Password is required.</div>
      </div>
      <button type="submit" class="btn-primary-custom" id="signInBtn">Sign in</button>
    </form>
    <div class="auth-footer">No account? <a href="auth-register.html">Create one</a></div>
  </div>

  <!-- DEV ONLY — remove in production -->
  <div class="dev-panel">
    <div class="dev-panel-header" id="devToggle">
      <span class="dev-label">⚙ DEV: Sign in as...</span>
      <i class="bi bi-chevron-down" id="devChevron" style="color:var(--text-muted);font-size:12px;"></i>
    </div>
    <div class="dev-body" id="devBody">
      <div class="dev-btns">
        <button class="dev-btn" onclick="devLogin('admin')">👑 Admin</button>
        <button class="dev-btn" onclick="devLogin('manager')">🔧 Manager</button>
        <button class="dev-btn" onclick="devLogin('member')">👤 Member</button>
      </div>
    </div>
  </div>
  <!-- END DEV ONLY -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Toggle password visibility
    document.getElementById('togglePw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const icon = document.querySelector('#togglePw i');
      if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye'; }
      else { pw.type = 'password'; icon.className = 'bi bi-eye-slash'; }
    });

    // Dev panel toggle
    document.getElementById('devToggle').addEventListener('click', () => {
      const body = document.getElementById('devBody');
      const chevron = document.getElementById('devChevron');
      body.classList.toggle('open');
      chevron.className = body.classList.contains('open') ? 'bi bi-chevron-up' : 'bi bi-chevron-down';
      chevron.style.color = 'var(--text-muted)'; chevron.style.fontSize = '12px';
    });

    function devLogin(role) {
      sessionStorage.setItem('role', role);
      sessionStorage.setItem('user', JSON.stringify({ name: role === 'admin' ? 'Alex Admin' : role === 'manager' ? 'Morgan Manager' : 'Max Member', initials: role === 'admin' ? 'AA' : role === 'manager' ? 'MM' : 'MX', role }));
      window.location.href = 'dashboard.html';
    }

    // Form submit
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailErr').style.display = 'block'; valid = false;
      } else { document.getElementById('emailErr').style.display = 'none'; }
      if (!password) {
        document.getElementById('passwordErr').style.display = 'block'; valid = false;
      } else { document.getElementById('passwordErr').style.display = 'none'; }
      if (!valid) return;
      const btn = document.getElementById('signInBtn');
      btn.innerHTML = '<span class="spinner"></span>Signing in...';
      btn.disabled = true;
      setTimeout(() => { devLogin('admin'); }, 1200);
    });
  </script>
</body>
</html>
