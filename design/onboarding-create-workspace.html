<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Workspace — PMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root{--bg-base:#0f1117;--bg-surface:#161b22;--bg-elevated:#1c2333;--bg-border:#30363d;--text-primary:#e6edf3;--text-secondary:#8b949e;--text-muted:#484f58;--accent:#2f81f7;--accent-subtle:rgba(47,129,247,0.12);--success:#3fb950;--warning:#d29922;--danger:#f85149;--font-body:"DM Sans",sans-serif;--font-mono:"DM Mono",monospace;--radius-sm:4px;--radius-md:8px;--radius-lg:12px}
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:var(--font-body);background:var(--bg-base);color:var(--text-primary);font-size:14px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--bg-border) 1px,transparent 1px);background-size:28px 28px;opacity:.35;pointer-events:none}
    h2{font-size:20px;font-weight:600;color:var(--text-primary)}
    p{font-size:14px;color:var(--text-secondary);line-height:1.6}
    label{font-size:12px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block}
    .auth-logo{font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:20px;text-align:center;position:relative;z-index:1}
    .auth-logo span{color:var(--accent)}
    .auth-card{background:var(--bg-surface);border:1px solid var(--bg-border);border-radius:var(--radius-lg);padding:40px;width:560px;max-width:90vw;position:relative;z-index:1}
    .fcc{background:var(--bg-elevated);border:1px solid var(--bg-border);border-radius:var(--radius-sm);color:var(--text-primary);padding:8px 12px;font-size:14px;width:100%;font-family:var(--font-body);outline:none;transition:border-color .15s,box-shadow .15s}
    .fcc:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-subtle)}
    .fcc::placeholder{color:var(--text-muted)}
    .fcc:read-only{opacity:.6;cursor:default}
    .btn-p{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:14px;font-weight:500;width:100%;cursor:pointer;transition:opacity .15s;font-family:var(--font-body)}
    .btn-p:hover{opacity:.88}
    .btn-sm{padding:4px 10px;font-size:12px;border-radius:var(--radius-sm);border:1px solid var(--bg-border);background:var(--bg-elevated);color:var(--text-secondary);cursor:pointer;font-family:var(--font-body)}
    .btn-sm:hover{color:var(--text-primary)}
    .fg{margin-bottom:18px}
    .slug-row{display:flex;gap:8px;align-items:center}
    .slug-row .fcc{flex:1}
    .slug-preview{font-size:12px;color:var(--text-muted);margin-top:6px;font-family:var(--font-mono)}
    .avatar-upload{display:flex;align-items:center;gap:16px;margin-bottom:20px}
    .avatar-circle{width:72px;height:72px;border-radius:50%;background:var(--accent-subtle);border:2px dashed var(--bg-border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s}
    .avatar-circle:hover{border-color:var(--accent)}
    .avatar-circle i{font-size:24px;color:var(--text-muted)}
    .step-pill{display:inline-block;background:var(--accent-subtle);color:var(--accent);border-radius:100px;padding:3px 12px;font-size:12px;font-weight:500;margin-bottom:20px}
    .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="auth-logo">P<span>M</span>S</div>
  <div class="auth-card">
    <div class="step-pill">Step 1 of 1</div>
    <h2 class="mb-1">Set up your workspace</h2>
    <p class="mb-4">This is where your team will manage projects and tasks.</p>
    <div class="avatar-upload">
      <div class="avatar-circle" id="avatarCircle" title="Upload logo">
        <i class="bi bi-building" id="avatarIcon"></i>
      </div>
      <div>
        <div style="font-weight:500;color:var(--text-primary);margin-bottom:4px;">Workspace Logo</div>
        <button type="button" class="btn-sm" onclick="document.getElementById('avatarFileInput').click()">Upload logo</button>
        <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="previewAvatar(this)" />
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">PNG, JPG up to 2MB</div>
      </div>
    </div>
    <form id="wsForm" novalidate>
      <div class="fg">
        <label for="wsName">Workspace Name</label>
        <input type="text" id="wsName" class="fcc" placeholder="e.g. Acme Corp" oninput="updateSlug()" />
      </div>
      <div class="fg">
        <label for="wsSlug">Workspace URL</label>
        <div class="slug-row">
          <input type="text" id="wsSlug" class="fcc" placeholder="acme-corp" readonly />
          <button type="button" class="btn-sm" id="editSlugBtn" onclick="toggleSlugEdit()">Edit</button>
        </div>
        <div class="slug-preview" id="slugPreview">app.pms.io/acme-corp</div>
      </div>
      <button type="submit" class="btn-p" id="createBtn">Create Workspace</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toSlug(s){return s.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')}
    function updateSlug(){
      const name=document.getElementById('wsName').value;
      const slug=toSlug(name);
      const slugEl=document.getElementById('wsSlug');
      if(slugEl.readOnly){slugEl.value=slug;}
      document.getElementById('slugPreview').textContent=`app.pms.io/${slug||'your-workspace'}`;
    }
    function toggleSlugEdit(){
      const slug=document.getElementById('wsSlug');
      const btn=document.getElementById('editSlugBtn');
      slug.readOnly=!slug.readOnly;
      btn.textContent=slug.readOnly?'Edit':'Lock';
      if(!slug.readOnly)slug.focus();
    }
    document.getElementById('wsSlug').addEventListener('input',()=>{
      const slug=document.getElementById('wsSlug').value;
      document.getElementById('slugPreview').textContent=`app.pms.io/${slug||'your-workspace'}`;
    });
    function previewAvatar(input){
      if(input.files&&input.files[0]){
        const reader=new FileReader();
        reader.onload=e=>{
          const ac=document.getElementById('avatarCircle');
          ac.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;border-radius:50%;object-fit:cover" />`;
        };reader.readAsDataURL(input.files[0]);
      }
    }
    document.getElementById('wsForm').addEventListener('submit',e=>{
      e.preventDefault();
      const name=document.getElementById('wsName').value.trim();
      if(!name)return;
      const btn=document.getElementById('createBtn');
      btn.innerHTML='<span class="spin"></span>Creating workspace...';btn.disabled=true;
      setTimeout(()=>{
        sessionStorage.setItem('workspace',JSON.stringify({name,slug:document.getElementById('wsSlug').value}));
        window.location.href='dashboard.html';
      },1200);
    });
  </script>
</body>
</html>
