<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — PMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="_shared.css" />
  <style>
    .avatar-lg { width: 80px; height: 80px; font-size: 28px; }
    .profile-hero { display: flex; align-items: center; gap: 24px; margin-bottom: 32px; }
  </style>
</head>
<body>
<!--
  REACT CONVERSION NOTES:
  Component: <Profile /> → /src/pages/Profile.jsx
  Role guard: All roles
-->
<nav class="topbar">
  <a href="dashboard.html" class="topbar-logo">P<span>M</span>S</a>
  <button class="workspace-switcher"><span>Acme Corp</span><i class="bi bi-chevron-down" style="font-size:11px"></i></button>
  <div class="topbar-search"><input type="text" class="search-input" placeholder="Search..." readonly onclick="window.location.href='search.html'" /></div>
  <div class="topbar-actions">
    <button class="icon-btn" onclick="window.location.href='notifications.html'"><i class="bi bi-bell"></i></button>
    <button class="avatar" id="avatarBtn" onclick="toggleAvatarMenu()">AA</button>
  </div>
  <div class="dropdown-pms" id="avatarMenu" style="right:8px;top:52px">
    <a href="profile.html" class="dropdown-item-pms active"><i class="bi bi-person"></i>Profile</a>
    <a href="auth-login.html" class="dropdown-item-pms danger"><i class="bi bi-box-arrow-right"></i>Sign Out</a>
  </div>
</nav>
<aside class="sidebar">
  <div class="sidebar-section-label">Main</div>
  <a href="dashboard.html" class="nav-item"><i class="bi bi-grid-1x2"></i>Dashboard</a>
  <a href="project-list.html" class="nav-item"><i class="bi bi-folder"></i>Projects</a>
  <a href="members-workspace.html" class="nav-item admin-only"><i class="bi bi-people"></i>Members</a>
  <a href="reports.html" class="nav-item manager-up"><i class="bi bi-bar-chart"></i>Reports</a>
  <a href="search.html" class="nav-item"><i class="bi bi-search"></i>Search</a>
  <div class="sidebar-section-label admin-only">Settings</div>
  <a href="admin-settings.html" class="nav-item admin-only"><i class="bi bi-gear"></i>Workspace</a>
  <a href="api-tokens.html" class="nav-item"><i class="bi bi-key"></i>API Tokens</a>
  <div class="sidebar-bottom">
    <div class="sidebar-user"><div class="avatar avatar-sm" id="sidebarAvatar">AA</div>
      <div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebarName">Alex Admin</div>
        <div class="sidebar-user-role"><span class="role-badge-sm" id="sidebarRole">Admin</span></div></div></div>
  </div>
</aside>
<main class="main-wrapper" style="max-width:800px">
  <div class="profile-hero">
    <div class="avatar avatar-lg" id="profAvatar">AA</div>
    <div>
      <h1 class="mb-1" id="profName">Alex Admin</h1>
      <div style="color:var(--text-secondary);font-size:14px" id="profEmail">alex@example.com</div>
      <div style="margin-top:8px"><span class="role-badge-sm" id="profRoleBadge">Admin</span></div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-md-3">
      <div style="display:flex;flex-direction:column;gap:4px">
        <a href="profile.html" class="btn-ghost" style="text-align:left;background:var(--bg-elevated);color:var(--text-primary)">General</a>
        <a href="api-tokens.html" class="btn-ghost" style="text-align:left">API Tokens</a>
      </div>
    </div>
    <div class="col-md-9">
      <div class="card-pms mb-4">
        <h3 style="margin-bottom:16px">Personal Information</h3>
        <div class="mb-3"><label>Full Name</label><input type="text" class="fcc" id="iName" value="Alex Admin" /></div>
        <div class="mb-3"><label>Email Address</label><input type="email" class="fcc" id="iEmail" value="alex@example.com" disabled /><small style="display:block;margin-top:4px">Email address is managed by the workspace administrator.</small></div>
        <div class="mb-3"><label>Bio</label><textarea class="fcc" rows="3">Lead engineer focusing on platform architecture.</textarea></div>
        <button class="btn-primary" onclick="showToast('Profile updated successfully','success')">Save Profile</button>
      </div>

      <div class="card-pms mb-4">
        <h3 style="margin-bottom:16px">Preferences</h3>
        <div class="mb-3">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0">
            <input type="checkbox" checked /> Email notifications for mentions
          </label>
        </div>
        <div class="mb-3">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0">
            <input type="checkbox" checked /> Email notifications for assigned issues
          </label>
        </div>
        <button class="btn-primary" onclick="showToast('Preferences saved','success')">Save Preferences</button>
      </div>
    </div>
  </div>
</main>

<div id="toast-container"></div>
<div class="dev-role-switcher">
  <span class="dev-role-label">Role:</span>
  <button class="dev-role-btn" id="devAdmin" onclick="switchRole('admin')">Admin</button>
  <button class="dev-role-btn" id="devManager" onclick="switchRole('manager')">Manager</button>
  <button class="dev-role-btn" id="devMember" onclick="switchRole('member')">Member</button>
</div>
<script>
let ROLE = sessionStorage.getItem('role')||'admin';
function initPage(){
  document.body.setAttribute('data-role',ROLE);
  const initials={admin:'AA',manager:'MM',member:'MX'};
  const inits = initials[ROLE];
  document.getElementById('avatarBtn').textContent=inits;
  document.getElementById('sidebarAvatar').textContent=inits;
  document.getElementById('profAvatar').textContent=inits;
  
  const names={admin:'Alex Admin',manager:'Morgan Manager',member:'Max Member'};
  const name = names[ROLE];
  document.getElementById('sidebarName').textContent=name;
  document.getElementById('profName').textContent=name;
  document.getElementById('iName').value=name;

  const emails={admin:'alex@example.com',manager:'morgan@example.com',member:'max@example.com'};
  document.getElementById('profEmail').textContent=emails[ROLE];
  document.getElementById('iEmail').value=emails[ROLE];

  const roleText = ROLE.charAt(0).toUpperCase()+ROLE.slice(1);
  document.getElementById('sidebarRole').textContent=roleText;
  document.getElementById('profRoleBadge').textContent=roleText;
  
  updateDevBtns();
}

function toggleAvatarMenu(){document.getElementById('avatarMenu').classList.toggle('open');}
document.addEventListener('click',e=>{if(!e.target.closest('#avatarBtn')&&!e.target.closest('#avatarMenu'))document.getElementById('avatarMenu').classList.remove('open');});
function switchRole(role){ROLE=role;sessionStorage.setItem('role',role);initPage();}
function updateDevBtns(){['admin','manager','member'].forEach(r=>{document.getElementById('dev'+r.charAt(0).toUpperCase()+r.slice(1)).classList.toggle('active',r===ROLE);});}
window.showToast=function(msg,type='info'){const c=document.getElementById('toast-container');const t=document.createElement('div');t.className=`toast-pms toast-${type}`;t.innerHTML=`<div class="toast-bar"></div><div class="toast-body">${msg}</div><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;c.appendChild(t);setTimeout(()=>{t.classList.add('fade-out');setTimeout(()=>t.remove(),200);},3000);};
initPage();
</script>
</body>
</html>
