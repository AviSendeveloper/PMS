<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found — PMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root{--bg-base:#0f1117;--bg-surface:#161b22;--bg-elevated:#1c2333;--bg-border:#30363d;--text-primary:#e6edf3;--text-secondary:#8b949e;--text-muted:#484f58;--accent:#2f81f7;--accent-subtle:rgba(47,129,247,0.12);--font-body:"DM Sans",sans-serif;--font-mono:"DM Mono",monospace;--radius-sm:4px}
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:var(--font-body);background:var(--bg-base);color:var(--text-primary);font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--bg-border) 1px,transparent 1px);background-size:28px 28px;opacity:.35;pointer-events:none}
    .err-code{font-size:72px;font-weight:700;color:var(--text-muted);font-family:var(--font-mono);line-height:1;margin-bottom:8px}
    h2{font-size:24px;font-weight:600;color:var(--text-primary);margin-bottom:12px}
    p{font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:24px}
    .btn-primary-e{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 20px;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;font-family:var(--font-body);text-decoration:none;display:inline-block}
    .btn-primary-e:hover{opacity:.88;color:#fff}
    .ghost-link{display:block;margin-top:12px;color:var(--text-muted);font-size:13px;text-decoration:none;cursor:pointer}
    .ghost-link:hover{color:var(--text-primary)}
    .icon-wrap{width:72px;height:72px;border-radius:50%;background:var(--accent-subtle);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
    .icon-wrap i{font-size:32px;color:var(--accent)}
  </style>
</head>
<body>
  <div style="position:relative;z-index:1">
    <div class="icon-wrap"><i class="bi bi-compass"></i></div>
    <div class="err-code">404</div>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="dashboard.html" class="btn-primary-e">Go to Dashboard</a>
    <a class="ghost-link" onclick="history.back()">Go Back</a>
  </div>
</body>
</html>
