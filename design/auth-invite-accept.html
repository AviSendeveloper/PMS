<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accept Invitation — PMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root{--bg-base:#0f1117;--bg-surface:#161b22;--bg-elevated:#1c2333;--bg-border:#30363d;--text-primary:#e6edf3;--text-secondary:#8b949e;--text-muted:#484f58;--accent:#2f81f7;--accent-subtle:rgba(47,129,247,0.12);--success:#3fb950;--warning:#d29922;--danger:#f85149;--font-body:"DM Sans",sans-serif;--font-mono:"DM Mono",monospace;--radius-sm:4px;--radius-md:8px;--radius-lg:12px}
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:var(--font-body);background:var(--bg-base);color:var(--text-primary);font-size:14px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--bg-border) 1px,transparent 1px);background-size:28px 28px;opacity:.35;pointer-events:none}
    h2{font-size:20px;font-weight:600;color:var(--text-primary)}
    p,small{color:var(--text-secondary)}
    label{font-size:12px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block}
    .auth-logo{font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:20px;text-align:center;position:relative;z-index:1}
    .auth-logo span{color:var(--accent)}
    .auth-card{background:var(--bg-surface);border:1px solid var(--bg-border);border-radius:var(--radius-lg);padding:40px;width:480px;max-width:90vw;position:relative;z-index:1}
    .fcc{background:var(--bg-elevated);border:1px solid var(--bg-border);border-radius:var(--radius-sm);color:var(--text-primary);padding:8px 12px;font-size:14px;width:100%;font-family:var(--font-body);outline:none;transition:border-color .15s,box-shadow .15s}
    .fcc:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-subtle)}
    .fcc::placeholder{color:var(--text-muted)}
    .iw{position:relative}
    .iw .tpw{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0;font-size:15px}
    .btn-p{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:14px;font-weight:500;width:100%;cursor:pointer;transition:opacity .15s;font-family:var(--font-body)}
    .btn-p:hover{opacity:.88}
    .invite-banner{background:var(--accent-subtle);border:1px solid rgba(47,129,247,.25);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:24px}
    .invite-banner strong{color:var(--text-primary)}
    .invite-banner small{display:block;margin-top:4px;font-size:12px;color:var(--text-muted)}
    .role-badge{display:inline-block;background:var(--accent-subtle);color:var(--accent);border-radius:100px;padding:2px 10px;font-size:12px;font-weight:500}
    .error-card{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.3);border-radius:var(--radius-md);padding:20px;text-align:center}
    .error-card h2{color:var(--danger)}
    .decline-link{display:block;text-align:center;margin-top:12px;font-size:13px;color:var(--text-muted);text-decoration:none;cursor:pointer}
    .decline-link:hover{color:var(--danger)}
    .fg{margin-bottom:16px}
    .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="auth-logo">P<span>M</span>S</div>
  <div class="auth-card" id="mainCard">
    <!-- Content injected by JS -->
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const MOCK_INVITE = { workspace: 'Acme Corp', role: 'Manager', invitedBy: 'Sarah Chen', invitedByEmail: 'sarah@acme.com', isNewUser: true };
    const params = new URLSearchParams(window.location.search);
    const card = document.getElementById('mainCard');

    if (params.get('expired') === '1') {
      card.innerHTML = `<div class="error-card">
        <i class="bi bi-clock-history" style="font-size:36px;color:var(--danger);"></i>
        <h2 class="mt-3">Invitation Expired</h2>
        <p>This invitation has expired (48h limit).</p>
        <p>Contact your Admin to request a new invitation.</p>
        <a href="auth-login.html" class="btn-p" style="display:inline-block;width:auto;margin-top:8px;text-decoration:none;">Back to Login</a>
      </div>`;
    } else {
      const inv = MOCK_INVITE;
      const newUserFields = inv.isNewUser ? `
        <div class="fg"><label for="fullName">Full Name</label><input type="text" id="fullName" class="fcc" placeholder="Jane Smith" /></div>
        <div class="fg"><label for="pw">Password</label>
          <div class="iw"><input type="password" id="pw" class="fcc" placeholder="Min. 8 characters" style="padding-right:36px" />
            <button type="button" class="tpw" onclick="this.previousElementSibling.type=this.previousElementSibling.type==='password'?'text':'password'" tabindex="-1"><i class="bi bi-eye-slash"></i></button></div></div>
        <div class="fg"><label for="cpw">Confirm Password</label>
          <div class="iw"><input type="password" id="cpw" class="fcc" placeholder="Repeat password" style="padding-right:36px" />
            <button type="button" class="tpw" onclick="this.previousElementSibling.type=this.previousElementSibling.type==='password'?'text':'password'" tabindex="-1"><i class="bi bi-eye-slash"></i></button></div></div>` : '';

      card.innerHTML = `
        <div class="invite-banner">
          <div>You've been invited to join <strong>${inv.workspace}</strong> as a <span class="role-badge">${inv.role}</span></div>
          <small>Invited by ${inv.invitedBy} (${inv.invitedByEmail})</small>
        </div>
        <h2 class="mb-1">${inv.isNewUser ? 'Create your account' : 'Accept Invitation'}</h2>
        <p class="mb-4">${inv.isNewUser ? 'Set up your account to join the workspace.' : 'Click below to accept and join the workspace.'}</p>
        ${newUserFields}
        <button class="btn-p" id="acceptBtn" onclick="accept()">Accept Invitation</button>
        <a class="decline-link" onclick="if(confirm('Decline invitation?'))window.location.href='auth-login.html'">Decline this invitation</a>`;
    }

    function accept() {
      const btn = document.getElementById('acceptBtn');
      btn.innerHTML = '<span class="spin"></span>Accepting...';
      btn.disabled = true;
      setTimeout(() => {
        sessionStorage.setItem('role', MOCK_INVITE.role.toLowerCase());
        sessionStorage.setItem('user', JSON.stringify({ name: 'Jane Smith', initials: 'JS', role: MOCK_INVITE.role.toLowerCase() }));
        window.location.href = 'dashboard.html';
      }, 1000);
    }
  </script>
</body>
</html>
